on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: ci

jobs:

  lint:
    uses: ./.github/workflows/lint.yaml
    secrets: inherit

  smoke:
    needs: lint
    uses: ./.github/workflows/smoke.yaml
    secrets: inherit

  check:
    needs: smoke
    # Only run full checks on main/master branch (not on PRs)
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/check.yaml
    secrets: inherit

  coverage:
    needs: smoke
    uses: ./.github/workflows/coverage.yaml
    secrets: inherit

  pkgdown:
    needs: smoke
    uses: ./.github/workflows/pkgdown.yaml
    secrets: inherit
    permissions:
      contents: write

  # Type-check the hand-written JS in inst/js (tsconfig.json; opt-in
  # per file via // @ts-check). No build step — checking only.
  typecheck-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npx -y -p typescript@~6.0.0 tsc
